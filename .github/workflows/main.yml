name: Build Flet APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Flet
        run: pip install "flet[cli]"
      - name: Extract Project
        run: unzip nour1.py.zip
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build APK
        run: |
          cd nour1.py
          flet build apk main.py
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: nour1.py/build/apk/app-release.apk
